# ---------------------------------------------------------------------------
# Candidate & vetting bucket  —  safe-keeping store, NOT the published list.
#
# This file holds the full research output from the from-scratch vetting pass
# (2026-07-16). Nothing here is auto-published: Jekyll reads _data/*.yml only
# when a template references it, so this is a data reservoir the future lists
# are generated FROM, not a page.
#
# Planned lists this feeds (per project direction):
#   - verified      : strict from-scratch list (currently = readme.md), gated by
#                     "specific requirements" still to be defined.
#   - unverified    : looser candidate list (qualifies + uncertain).
#   - metrics/sizes : params, tokens, tokenizer, cluster, license tables.
#
# status values:
#   listed       - already on the verified list (readme.md)
#   qualifies    - vetted, passes the from-scratch + institution rules, not yet listed
#   uncertain    - from-scratch OK but an open requirement question blocks a call
#   disqualified - fails a rule; kept so it is not re-litigated
#
# Evidence quotes are verbatim-ish from the cited source; every record carries a
# source URL. Institution_type: university | non-profit | national-lab |
# public-consortium | company. verdict mirrors status for non-listed entries.
# ---------------------------------------------------------------------------

meta:
  compiled: "2026-07-16"
  method: "HF API (existence/gated/license via curl) + paper/model-card evidence for the from-scratch claim, vetted adversarially against the registry's inclusion criteria."
  # Requirements confirmed with the project owner 2026-07-16:
  verified_ruleset:
    from_scratch: "Random init / tabula rasa (unchanged). Continued-pretrain/fine-tune/LoRA on any base = out."
    institution_split: "TWO verified lists, not one: (a) pure-academic = university / non-profit / national-lab / public-consortium with NO commercial co-developer; leveraging commercial CLOUD/compute/hardware is allowed and stays pure-academic. (b) academic-commercial = academic-led but with a commercial co-developer/partner."
    open_weights: "REQUIRED for either verified list. Publicly downloadable (click-through / auto-gate OK). Approval-gated, private, or unreleased weights => unverified."
    scale_floor: "~1B parameters. A family with a >=1B released variant qualifies at those sizes; sub-1B-only models => unverified/metrics list."
    model_type: "Generative LMs only for the verified lists (decoder / enc-dec / diffusion). Encoder-only (BERT-style) EXCLUDED from verified; park in candidate bucket."
    collaboration field on each record below: "pure-academic | academic-commercial (added where determined)."
  open_question: "Resolve 3 conflicts these rules create with EXISTING listed entries before rewriting readme: (1) GatorTronGPT — criteria.md carved out its PHI-gated weights, but 'open weights required' would drop it; (2) GPT-SW3 / Fanar Star / NorGPT — gated or unreleased weights => move to unverified?; (3) BLOOM — consortium with heavy Hugging Face involvement => pure, collaboration, or its own consortium bucket? Also: TeenyTinyLlama (160M/460M) drops on the 1B floor. See listed_edge_cases."

