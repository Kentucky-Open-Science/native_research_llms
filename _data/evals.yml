# ---------------------------------------------------------------------------
# Ranking bucket. HEADLINE METRIC = IFEval strict-avg (2026-07-17).
#
# strict-avg = mean of IFEval prompt-level-strict + instruction-level-strict
# accuracy. This IS the Open LLM Leaderboard v2 "IFEval" column. It is the only
# metric we rank on, because the goal is to measure university autoregressive-
# decoder progress against the original-ChatGPT / GPT-3.5 line.
#
#   ANCHOR: GPT-3.5-turbo strict-avg ~= 59.3  (prompt-strict 53.8 / inst 64.7).
#
# Universities come FIRST (that is the point of the registry). MMLU is kept as a
# SECONDARY field only.
#
# status:
#   oll        = IFEval strict-avg straight from the Open LLM Leaderboard (gold).
#   strict-avg = strict-avg computed from the card's two strict sub-metrics.
#   mismatch   = an IFEval number exists but in a NON-strict-avg format (loose,
#                prompt-strict, or unlabeled) -> NOT comparable; shown, not ranked.
#   needs-eval = no published IFEval in any format. Candidate for us to run.
# fmt: strict-avg | loose | prompt-strict | unlabeled | none
# ---------------------------------------------------------------------------

meta:
  updated: "2026-07-17"
  headline_metric: "IFEval strict-avg (Open LLM Leaderboard v2 'IFEval' column)"
  anchor: "GPT-3.5-turbo strict-avg ~=59.3 (original-ChatGPT line)"
  finding: "Across all verified models, IFEval strict-avg exists for only ~10. Of the UNIVERSITY models, only 3 have a comparable strict-avg (Jais 2, LLM360 K2, TinyLlama). The rest have no published IFEval and must be evaluated by us."
  format_warning: "Do NOT mix formats. loose > strict, and prompt-strict != strict-avg. Apertus(loose), OLMo 3(inst-loose), InternLM3(prompt-strict), SmallThinker(unlabeled) are shown but NOT ranked against the strict-avg line."

# Commercial reference line (strict-avg unless noted). GPT-3.5 is THE anchor.
anchors:
  - { name: "GPT-4", ifeval: 80.2, fmt: strict-avg, note: "derived from IFEval paper (76.9/83.6)", src: "https://arxiv.org/abs/2311.07911" }
  - { name: "GPT-4o", ifeval: 81.0, fmt: unlabeled, note: "OpenAI single figure; strict/loose not disclosed", src: "https://openai.com/index/gpt-4-1/" }
  - { name: "Qwen2.5-72B-Instruct", ifeval: 86.4, fmt: strict-avg, src: "OLL v2" }
  - { name: "Llama-3.1-70B-Instruct", ifeval: 86.7, fmt: strict-avg, src: "OLL v2" }
  - { name: "gemma-2-9b-it", ifeval: 74.4, fmt: strict-avg, src: "OLL v2" }
  - { name: "GPT-3.5-turbo", ifeval: 59.3, fmt: strict-avg, note: "ANCHOR; prompt-strict 53.8 / inst-strict 64.7", src: "https://arxiv.org/abs/2402.13064" }
  - { name: "Mistral-7B-Instruct-v0.2", ifeval: 55.0, fmt: strict-avg, src: "OLL v2" }
  - { name: "Llama-2-70b-chat", ifeval: 49.6, fmt: strict-avg, note: "GPT-3.5 contemporary", src: "OLL v2" }

