  - { name: "Jais 2", inst: "MBZUAI", variant: "Jais-2-70B-Chat", ifeval: 74.9, mmlu: null, fmt: strict-avg, status: strict-avg, note: "EN; AR 70.6; card (70.78/78.93)", src: "https://huggingface.co/inceptionai/Jais-2-70B-Chat" }
