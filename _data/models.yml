# ---------------------------------------------------------------------------
# Master roster, single source of truth for list membership.
# Organized by INSTITUTION TYPE (primary axis), per the rulings of 2026-07-17.
#
# academic  = a UNIVERSITY. Full stop. This is the first/headline list.
# A commercial co-developer does NOT move a university model off this list; it
# is recorded as `partner:` (a tag). MBZUAI, IST, CentraleSupélec, SUTD, SJTU
# etc. are degree-granting universities and count.
#
# research_institute = non-profit institutes, national labs, government research
# institutes, and foundations. In the registry, but NOT academic and never first.
# (Ai2, EleutherAI, BAAI, TII, NII, SDAIA, AI Singapore, Shanghai AI Lab, ORNL,
#  BSC, HUN-REN, RWKV Foundation, plus M-A-P and the Tsinghua+BAAI CPM effort.)
#
# consortium = named multi-party public research consortia.
# unverified = fails a verified requirement (kept, not tossed).
#
# Verified requirement: from-scratch + open downloadable weights + >=~1B params
#   + generative. Exception: PHI/PII data-protection gating (GatorTronGPT).
# weights: open | open-nc | phi-gate-exception | gated-approval | region-locked
#          | unreleased | private
# ---------------------------------------------------------------------------

meta:
  updated: "2026-07-17"
  decisions:
    academic_definition: "Academic = a university. Non-profit research institutes, national labs, government institutes, and think tanks are NOT academic (corrects the repo's original criteria that listed Ai2/EleutherAI as academic)."
    primary_axis: "Institution type. Universities first, then research institutes & national labs, then consortia. Commercial-partner status is a tag, not a top-level split."
    borderline: "MAP-Neo (M-A-P collective) and CPM-1 (Tsinghua + BAAI) are classified NON-university → research_institute."
    gatortrongpt: "Kept (university, U Florida) via a documented PHI data-protection exception to the open-weights rule."
    gated_weights: "Unavailable weights = not verified: GPT-SW3, Fanar Star, NorGPT → unverified."

